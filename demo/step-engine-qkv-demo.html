<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920">
  <title>Attention QKV 拆解 — Step 引擎演示</title>
  <style>
    /* ── 核心变量 ── */
    :root {
      --slide-width: 1920px;
      --slide-height: 1080px;
      --transition-duration: 800ms;
      --color-bg: #07111d;
      --color-bg-strong: #050a12;
      --color-text: #eff5ff;
      --color-text-muted: rgba(239, 245, 255, 0.72);
      --color-accent: #79e8ff;
      --color-accent-warm: #ff9f72;
      --color-danger: #ff8787;
      --color-focus: #b8f4ff;
      --font-display: 'Baskerville', 'Times New Roman', serif;
      --font-body: 'Avenir Next', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      --cyan: #79e8ff;
      --orange: #ff9f72;
      --green: #7aefb2;
      --purple: #c4a0ff;
      --pink: #ff8ec4;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: var(--slide-width);
      height: var(--slide-height);
      overflow: hidden;
      color: var(--color-text);
      font-family: var(--font-body);
      background:
        radial-gradient(circle at 18% 20%, rgba(121, 232, 255, 0.16), transparent 24%),
        radial-gradient(circle at 82% 18%, rgba(255, 159, 114, 0.14), transparent 20%),
        linear-gradient(150deg, #07111d 0%, #09192b 52%, #04070d 100%);
    }

    .slideshow { position: relative; width: 100%; height: 100%; isolation: isolate; }

    .slide {
      position: absolute; inset: 0; opacity: 0; pointer-events: none;
      transition: opacity var(--transition-duration) ease; overflow: hidden;
    }
    .slide.active { opacity: 1; pointer-events: auto; }

    .scene-counter, .presentation-tag, .control-hint {
      position: fixed; z-index: 30;
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(7, 16, 28, 0.44);
      color: rgba(255,255,255,0.66);
    }
    .presentation-tag, .scene-counter {
      top: 24px; padding: 10px 16px; border-radius: 999px;
      font-size: 14px; letter-spacing: 0.14em; text-transform: uppercase;
    }
    .presentation-tag { left: 24px; }
    .scene-counter { right: 24px; }
    .control-hint { left: 24px; bottom: 24px; padding: 14px 18px; border-radius: 18px; font-size: 16px; }

    .progress-track {
      position: fixed; left: 24px; right: 24px; bottom: 18px;
      height: 4px; border-radius: 999px;
      background: rgba(255,255,255,0.08); overflow: hidden; z-index: 25;
    }
    .progress-bar { width: 0; height: 100%; background: linear-gradient(90deg, var(--color-accent), var(--color-accent-warm)); }

    [data-enter-at] { opacity: 0; transform: translateY(24px) scale(0.985); transition: opacity 680ms ease, transform 680ms ease; }
    [data-enter-at].visible { opacity: 1; transform: translateY(0) scale(1); }

    .is-highlighted { transition: transform 380ms ease, opacity 380ms ease, filter 380ms ease; }
    .is-dimmed { opacity: 0.4; transform: scale(0.985); transition: opacity 380ms ease, transform 380ms ease; }

    .step-hidden { opacity: 0; pointer-events: none; visibility: hidden; }
    .step-entering { visibility: visible; pointer-events: auto; }
    .step-exiting { visibility: visible; pointer-events: none; }
    [data-el] { transform-box: fill-box; transform-origin: center center; }

    /* ── Keyframes ── */
    @keyframes fadeIn { from { opacity: 0; visibility: visible; } to { opacity: 1; visibility: visible; } }
    @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; visibility: hidden; } }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.7); visibility: visible; } to { opacity: 1; transform: scale(1); visibility: visible; } }
    @keyframes scaleOut { from { opacity: 1; transform: scale(1); } to { opacity: 0; transform: scale(0.7); visibility: hidden; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(30px); visibility: visible; } to { opacity: 1; transform: translateY(0); visibility: visible; } }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-30px); visibility: visible; } to { opacity: 1; transform: translateY(0); visibility: visible; } }
    @keyframes slideLeft { from { opacity: 0; transform: translateX(40px); visibility: visible; } to { opacity: 1; transform: translateX(0); visibility: visible; } }
    @keyframes slideRight { from { opacity: 0; transform: translateX(-40px); visibility: visible; } to { opacity: 1; transform: translateX(0); visibility: visible; } }
    @keyframes slideOutLeft { from { opacity: 1; transform: translateX(0); } to { opacity: 0; transform: translateX(-40px); visibility: hidden; } }
    @keyframes slideOutRight { from { opacity: 1; transform: translateX(0); } to { opacity: 0; transform: translateX(40px); visibility: hidden; } }
    @keyframes slideOutUp { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-30px); visibility: hidden; } }
    @keyframes drawPath { from { stroke-dashoffset: var(--path-length, 1000); opacity: 1; visibility: visible; } to { stroke-dashoffset: 0; opacity: 1; visibility: visible; } }
    @keyframes erasePath { from { stroke-dashoffset: 0; opacity: 1; } to { stroke-dashoffset: var(--path-length, 1000); opacity: 0; visibility: hidden; } }
    @keyframes pulseGlow { 0%, 100% { filter: drop-shadow(0 0 0 transparent); } 50% { filter: drop-shadow(0 0 12px var(--color-accent)); } }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(24px); visibility: visible; } to { opacity: 1; transform: translateY(0); visibility: visible; } }

    /* ── Demo 专用样式 ── */
    .guide-text {
      position: absolute;
      font-size: 28px;
      color: var(--color-text-muted);
      letter-spacing: 0.04em;
    }
    .title-text {
      position: absolute;
      font-family: var(--font-display);
      font-size: 52px;
      font-weight: 300;
      letter-spacing: 0.06em;
      color: var(--color-text);
    }

    /* SVG 文字样式 */
    .svg-label { font-family: 'Avenir Next', 'PingFang SC', sans-serif; }
    .svg-label-sm { font-size: 18px; fill: rgba(239,245,255,0.6); }
    .svg-label-md { font-size: 22px; fill: var(--color-text); }
    .svg-label-lg { font-size: 28px; fill: var(--color-text); font-weight: 600; }
  </style>
</head>
<body>
  <div class="presentation-tag">Step Engine Demo</div>
  <div class="scene-counter" id="sceneCounter">1 / 1</div>

  <main class="slideshow" id="slideshow">

    <!-- ═══════════════════════════════════════════════════════════ -->
    <!-- 章节 1：Attention QKV 拆解 — 全程单画布连续演化             -->
    <!-- ═══════════════════════════════════════════════════════════ -->
    <section class="slide" data-scene="1" data-duration="30000">

      <!-- 背景装饰（常驻，不参与 step） -->
      <svg viewBox="0 0 1920 1080" style="position:absolute;inset:0;width:100%;height:100%">
        <defs>
          <radialGradient id="glow-cyan" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="rgba(121,232,255,0.15)"/>
            <stop offset="100%" stop-color="transparent"/>
          </radialGradient>
          <radialGradient id="glow-orange" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="rgba(255,159,114,0.12)"/>
            <stop offset="100%" stop-color="transparent"/>
          </radialGradient>
          <!-- 箭头标记 -->
          <marker id="arrow-cyan" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 Z" fill="var(--cyan)"/>
          </marker>
          <marker id="arrow-orange" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 Z" fill="var(--orange)"/>
          </marker>
        </defs>

        <!-- 微弱的网格 -->
        <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
          <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
        </pattern>
        <rect width="1920" height="1080" fill="url(#grid)"/>

        <!-- ═══ Step 元素：全部初始隐藏 ═══ -->

        <!-- 输入词块 "Thinking" -->
        <g data-el="input-word" class="step-hidden">
          <rect x="140" y="440" width="220" height="70" rx="12"
            fill="rgba(121,232,255,0.12)" stroke="var(--cyan)" stroke-width="2"/>
          <text x="250" y="484" text-anchor="middle" class="svg-label svg-label-lg" fill="var(--cyan)">Thinking</text>
        </g>

        <!-- 三条连线 -->
        <path data-el="line-to-q" class="step-hidden"
          d="M 360 460 C 480 460, 520 280, 600 280"
          stroke="var(--cyan)" stroke-width="2.5" fill="none" marker-end="url(#arrow-cyan)"/>

        <path data-el="line-to-k" class="step-hidden"
          d="M 360 475 L 600 475"
          stroke="var(--green)" stroke-width="2.5" fill="none" marker-end="url(#arrow-cyan)"/>

        <path data-el="line-to-v" class="step-hidden"
          d="M 360 490 C 480 490, 520 670, 600 670"
          stroke="var(--orange)" stroke-width="2.5" fill="none" marker-end="url(#arrow-cyan)"/>

        <!-- Q 节点 -->
        <g data-el="query-node" class="step-hidden" data-focus-group="qkv">
          <rect x="620" y="240" width="200" height="80" rx="14"
            fill="rgba(121,232,255,0.15)" stroke="var(--cyan)" stroke-width="2"/>
          <text x="720" y="270" text-anchor="middle" class="svg-label svg-label-md" fill="var(--cyan)">Query</text>
          <text x="720" y="298" text-anchor="middle" class="svg-label svg-label-sm">"我在找什么？"</text>
        </g>

        <!-- K 节点 -->
        <g data-el="key-node" class="step-hidden" data-focus-group="qkv">
          <rect x="620" y="435" width="200" height="80" rx="14"
            fill="rgba(122,239,178,0.15)" stroke="var(--green)" stroke-width="2"/>
          <text x="720" y="465" text-anchor="middle" class="svg-label svg-label-md" fill="var(--green)">Key</text>
          <text x="720" y="493" text-anchor="middle" class="svg-label svg-label-sm">"我能提供什么？"</text>
        </g>

        <!-- V 节点 -->
        <g data-el="value-node" class="step-hidden" data-focus-group="qkv">
          <rect x="620" y="630" width="200" height="80" rx="14"
            fill="rgba(255,159,114,0.15)" stroke="var(--orange)" stroke-width="2"/>
          <text x="720" y="660" text-anchor="middle" class="svg-label svg-label-md" fill="var(--orange)">Value</text>
          <text x="720" y="688" text-anchor="middle" class="svg-label svg-label-sm">"我的实际内容"</text>
        </g>

        <!-- Q→K 相似度箭头 -->
        <path data-el="qk-arrow" class="step-hidden"
          d="M 820 280 C 960 280, 960 475, 820 475"
          stroke="var(--purple)" stroke-width="3" fill="none"
          stroke-dasharray="4,6" marker-end="url(#arrow-cyan)"/>

        <!-- 相似度标签 -->
        <g data-el="similarity-label" class="step-hidden">
          <rect x="900" y="350" width="180" height="56" rx="10"
            fill="rgba(196,160,255,0.12)" stroke="var(--purple)" stroke-width="1.5"/>
          <text x="990" y="374" text-anchor="middle" class="svg-label" font-size="16" fill="var(--purple)">Q · K</text>
          <text x="990" y="396" text-anchor="middle" class="svg-label" font-size="20" fill="var(--color-text)" font-weight="600">相似度分数</text>
        </g>

        <!-- Softmax 框 -->
        <g data-el="softmax-box" class="step-hidden">
          <rect x="1140" y="350" width="160" height="56" rx="10"
            fill="rgba(255,142,196,0.12)" stroke="var(--pink)" stroke-width="1.5"/>
          <text x="1220" y="385" text-anchor="middle" class="svg-label svg-label-md" fill="var(--pink)">Softmax</text>
        </g>

        <!-- Softmax → 权重箭头 -->
        <path data-el="softmax-arrow" class="step-hidden"
          d="M 1080 378 L 1140 378"
          stroke="var(--pink)" stroke-width="2" fill="none" marker-end="url(#arrow-cyan)"/>

        <!-- 权重条形图 -->
        <g data-el="weight-bars" class="step-hidden">
          <text x="1380" y="260" text-anchor="middle" class="svg-label svg-label-sm">注意力权重</text>
          <!-- 三个权重条 -->
          <rect x="1340" y="280" width="80" height="30" rx="4"
            fill="var(--cyan)" opacity="0.9" style="transform-origin: left center"/>
          <text x="1430" y="300" class="svg-label" font-size="16" fill="var(--cyan)">0.65</text>
          <rect x="1340" y="320" width="46" height="30" rx="4"
            fill="var(--green)" opacity="0.7" style="transform-origin: left center"/>
          <text x="1396" y="340" class="svg-label" font-size="16" fill="var(--green)">0.25</text>
          <rect x="1340" y="360" width="18" height="30" rx="4"
            fill="var(--orange)" opacity="0.5" style="transform-origin: left center"/>
          <text x="1368" y="380" class="svg-label" font-size="16" fill="var(--orange)">0.10</text>
        </g>

        <!-- 权重 × V 连线 -->
        <path data-el="weight-to-v" class="step-hidden"
          d="M 1300 378 C 1380 500, 1200 620, 1100 670"
          stroke="var(--orange)" stroke-width="2" fill="none"
          stroke-dasharray="6,4" marker-end="url(#arrow-orange)"/>

        <!-- 最终输出 -->
        <g data-el="output-node" class="step-hidden">
          <rect x="1380" y="520" width="280" height="90" rx="16"
            fill="rgba(121,232,255,0.08)" stroke="var(--cyan)" stroke-width="2.5"/>
          <text x="1520" y="558" text-anchor="middle" class="svg-label" font-size="24" fill="var(--color-text)" font-weight="600">加权求和输出</text>
          <text x="1520" y="588" text-anchor="middle" class="svg-label svg-label-sm">Σ (权重 × Value)</text>
        </g>

        <!-- 整体流程高亮框 -->
        <rect data-el="full-highlight" class="step-hidden"
          x="110" y="210" width="1580" height="570" rx="24"
          fill="none" stroke="var(--cyan)" stroke-width="1.5" stroke-dasharray="8,6" opacity="0.3"/>

      </svg>

      <!-- HTML 标注文字 -->
      <div data-el="title-top" class="step-hidden title-text" style="top:70px; left:140px">
        Self-Attention 核心：Q · K · V
      </div>

      <div data-el="anno-embed" class="step-hidden guide-text" style="top:540px; left:160px; max-width:200px; font-size:18px; line-height:1.6; color:rgba(255,255,255,0.5)">
        输入词经过三个<br/>线性变换矩阵<br/>W<sub>Q</sub> · W<sub>K</sub> · W<sub>V</sub>
      </div>

      <div data-el="anno-score" class="step-hidden guide-text" style="top:440px; right:540px; font-size:20px; color:var(--purple)">
        点积衡量<br/>"谁和谁相关"
      </div>

      <div data-el="anno-final" class="step-hidden guide-text" style="bottom:200px; right:200px; font-size:24px; color:var(--cyan); text-align:right">
        高权重的 Value 主导输出 →<br/>模型"注意"到了最相关的信息
      </div>

    </section>

  </main>

  <div class="control-hint">空格 / → 下一步，← 上一步，P 暂停，R 继续</div>
  <div class="progress-track"><div class="progress-bar" id="progressBar"></div></div>

  <script>
    window.presentationData = {};
    window.timelineConfig = { autoPlay: false, scenes: [{ scene: 1, duration: 30000 }] };
    window.stepConfig = {
      "slide-1": [
        {
          // Step 1：标题 + 输入词出现
          "duration": 1200,
          "actions": [
            { "target": "title-top",   "type": "enter", "animation": "fadeIn" },
            { "target": "input-word",  "type": "enter", "animation": "scaleIn", "delay": 400 }
          ]
        },
        {
          // Step 2：三条连线依次绘制 + 标注
          "duration": 1800,
          "actions": [
            { "target": "line-to-q",   "type": "enter", "animation": "drawPath" },
            { "target": "line-to-k",   "type": "enter", "animation": "drawPath", "delay": 300 },
            { "target": "line-to-v",   "type": "enter", "animation": "drawPath", "delay": 600 },
            { "target": "anno-embed",  "type": "enter", "animation": "fadeIn",   "delay": 400 }
          ]
        },
        {
          // Step 3：Q / K / V 三个节点依次入场
          "duration": 1600,
          "actions": [
            { "target": "query-node",  "type": "enter", "animation": "scaleIn" },
            { "target": "key-node",    "type": "enter", "animation": "scaleIn", "delay": 400 },
            { "target": "value-node",  "type": "enter", "animation": "scaleIn", "delay": 800 }
          ]
        },
        {
          // Step 4：左侧流程淡出，Q→K 箭头 + 相似度标签入场
          "duration": 1600,
          "actions": [
            { "target": "input-word",  "type": "exit",  "animation": "fadeOut" },
            { "target": "line-to-q",   "type": "exit",  "animation": "fadeOut" },
            { "target": "line-to-k",   "type": "exit",  "animation": "fadeOut" },
            { "target": "line-to-v",   "type": "exit",  "animation": "fadeOut" },
            { "target": "anno-embed",  "type": "exit",  "animation": "fadeOut" },
            { "target": "qk-arrow",    "type": "enter", "animation": "drawPath", "delay": 500 },
            { "target": "similarity-label", "type": "enter", "animation": "scaleIn", "delay": 800 },
            { "target": "anno-score",  "type": "enter", "animation": "fadeIn", "delay": 1000 }
          ]
        },
        {
          // Step 5：Q/K 高亮，V 弱化 — 聚焦"相似度计算"
          "duration": 1200,
          "actions": [
            { "target": "query-node",  "type": "highlight", "group": "qkv" },
            { "target": "key-node",    "type": "highlight", "group": "qkv" }
          ]
        },
        {
          // Step 6：Softmax + 权重条出现，Q/K 高亮取消
          "duration": 1600,
          "actions": [
            { "target": "query-node",  "type": "dim" },
            { "target": "key-node",    "type": "dim" },
            { "target": "softmax-arrow", "type": "enter", "animation": "drawPath" },
            { "target": "softmax-box", "type": "enter", "animation": "scaleIn", "delay": 300 },
            { "target": "weight-bars", "type": "enter", "animation": "slideLeft", "delay": 600 },
            { "target": "anno-score",  "type": "exit",  "animation": "fadeOut" }
          ]
        },
        {
          // Step 7：权重 × V 连线 + V 高亮 + 输出节点
          "duration": 1800,
          "actions": [
            { "target": "value-node",  "type": "highlight", "group": "qkv" },
            { "target": "weight-to-v", "type": "enter", "animation": "drawPath", "delay": 300 },
            { "target": "output-node", "type": "enter", "animation": "scaleIn", "delay": 800 },
            { "target": "anno-final",  "type": "enter", "animation": "fadeIn",   "delay": 1200 }
          ]
        },
        {
          // Step 8：全流程高亮框出现，所有节点恢复正常
          "duration": 1200,
          "actions": [
            { "target": "query-node",    "type": "morph", "style": { "opacity": "1", "transform": "scale(1)" } },
            { "target": "key-node",      "type": "morph", "style": { "opacity": "1", "transform": "scale(1)" } },
            { "target": "value-node",    "type": "morph", "style": { "opacity": "1", "transform": "scale(1)" } },
            { "target": "full-highlight","type": "enter", "animation": "fadeIn", "delay": 300 }
          ]
        }
      ]
    };

    class TimelineEngine {
      constructor() {
        this.slides = Array.from(document.querySelectorAll('.slide'));
        this.currentIndex = 0;
        this.sceneTimer = null;
        this.elementTimers = [];
        this.actionTimers = [];
        this.stepTimers = [];
        this.progressBar = document.getElementById('progressBar');
        this.counter = document.getElementById('sceneCounter');
        this.totalDuration = this.slides.reduce((sum, slide) => sum + this.getSlideDuration(slide), 0);
        this.elapsedTotal = 0;
        this.stepGap = 600;
        this.currentStep = -1;
        this.updateCounter();
      }

      getSceneConfig(slide) {
        const sceneId = Number(slide.dataset.scene);
        return (window.timelineConfig.scenes || []).find(item => item.scene === sceneId) || null;
      }

      getSlideDuration(slide) {
        return this.getSceneConfig(slide)?.duration ?? Number(slide.dataset.duration) ?? 10000;
      }

      getElementEnterAt(element) { return Number(element.dataset.enterAt) || 0; }

      getSlideSteps(slide) {
        const sceneId = slide.dataset.scene;
        return window.stepConfig[`slide-${sceneId}`] || [];
      }

      clearTimers() {
        if (this.sceneTimer) clearTimeout(this.sceneTimer);
        this.elementTimers.forEach(t => clearTimeout(t));
        this.actionTimers.forEach(t => clearTimeout(t));
        this.stepTimers.forEach(t => clearTimeout(t));
        this.elementTimers = []; this.actionTimers = []; this.stepTimers = [];
      }

      resetSlideState() {
        this.slides.forEach(slide => {
          slide.classList.remove('active');
          slide.querySelectorAll('[data-enter-at]').forEach(el => el.classList.remove('visible'));
          slide.querySelectorAll('.is-highlighted, .is-dimmed').forEach(el => el.classList.remove('is-highlighted', 'is-dimmed'));
        });
      }

      resetSlideStepState(slide) {
        slide.querySelectorAll('[data-el]').forEach(el => {
          el.classList.add('step-hidden');
          el.classList.remove('step-entering', 'step-exiting', 'is-highlighted', 'is-dimmed');
          el.style.animation = '';
          el.style.transform = '';
          el.style.transition = '';
          el.style.opacity = '';
          el.style.visibility = '';
          el.style.filter = '';
          if (el.hasAttribute('stroke-dashoffset') || el.style.strokeDashoffset) {
            const pathLen = el.style.getPropertyValue('--path-length') || el.getAttribute('stroke-dasharray');
            if (pathLen) el.style.strokeDashoffset = pathLen;
          }
          if (el._originalAttrs) {
            for (const [attr, val] of Object.entries(el._originalAttrs)) el.setAttribute(attr, val);
            delete el._originalAttrs;
          }
        });
      }

      updateCounter() {
        const slide = this.slides[this.currentIndex];
        const steps = this.getSlideSteps(slide);
        if (steps.length > 0) {
          this.counter.textContent = `${this.currentIndex + 1}.${Math.max(0, this.currentStep) + 1} / ${this.slides.length}`;
        } else {
          this.counter.textContent = `${Math.min(this.currentIndex + 1, this.slides.length)} / ${this.slides.length}`;
        }
      }

      animateProgress(startTime, duration) {
        const loop = () => {
          const elapsed = Date.now() - startTime;
          const totalProgress = Math.min((this.elapsedTotal + elapsed) / this.totalDuration, 1);
          this.progressBar.style.width = `${totalProgress * 100}%`;
          if (elapsed < duration) requestAnimationFrame(loop);
        };
        requestAnimationFrame(loop);
      }

      executeStep(slide, stepIndex) {
        const steps = this.getSlideSteps(slide);
        if (stepIndex < 0 || stepIndex >= steps.length) return false;
        const step = steps[stepIndex];
        for (const action of step.actions) {
          const el = slide.querySelector(`[data-el="${action.target}"]`);
          if (!el) continue;
          const delay = action.delay || 0;
          if (delay > 0) {
            const timer = setTimeout(() => this.applyStepAction(el, action), delay);
            this.stepTimers.push(timer);
          } else {
            this.applyStepAction(el, action);
          }
        }
        return true;
      }

      applyStepAction(el, action) {
        const duration = action.duration;
        const isSVG = el instanceof SVGElement;

        switch (action.type) {
          case 'enter': {
            el.classList.remove('step-hidden', 'step-exiting');
            el.classList.add('step-entering');
            el.style.visibility = 'visible';
            const dur = duration || 600;
            const anim = action.animation || 'fadeIn';
            if (anim === 'drawPath' && isSVG) this.initDrawPath(el);
            el.style.animation = `${anim} ${dur}ms ease forwards`;
            break;
          }
          case 'exit': {
            el.classList.add('step-exiting');
            el.classList.remove('step-entering');
            const dur = duration || 400;
            const anim = action.animation || 'fadeOut';
            if (anim === 'erasePath' && isSVG) this.initDrawPath(el);
            el.style.animation = `${anim} ${dur}ms ease forwards`;
            el.addEventListener('animationend', () => {
              el.classList.add('step-hidden');
              el.classList.remove('step-exiting');
              el.style.visibility = 'hidden';
            }, { once: true });
            break;
          }
          case 'move': {
            const dur = duration || 600;
            el.style.transition = `transform ${dur}ms ease`;
            el.style.transform = action.transform || `translate(${action.x||0}px, ${action.y||0}px)`;
            break;
          }
          case 'morph': {
            const dur = duration || 600;
            if (action.style) { el.style.transition = `all ${dur}ms ease`; Object.assign(el.style, action.style); }
            if (action.attrs && isSVG) {
              if (!el._originalAttrs) el._originalAttrs = {};
              for (const [attr, val] of Object.entries(action.attrs)) {
                if (!(attr in el._originalAttrs)) el._originalAttrs[attr] = el.getAttribute(attr);
              }
              el.style.transition = `all ${dur}ms ease`;
              for (const [attr, val] of Object.entries(action.attrs)) {
                const cssifiable = ['fill','stroke','stroke-width','opacity','r','rx','ry','cx','cy','x','y','width','height','font-size'];
                cssifiable.includes(attr) ? el.style.setProperty(attr, val) : el.setAttribute(attr, val);
              }
            }
            break;
          }
          case 'highlight': {
            el.classList.add('is-highlighted');
            el.classList.remove('is-dimmed');
            if (isSVG && !action.noGlow) {
              el.style.filter = `drop-shadow(0 0 8px var(--color-accent))`;
              el.style.transition = 'filter 380ms ease, opacity 380ms ease';
            }
            if (action.group) {
              const slide = el.closest('.slide');
              if (slide) {
                slide.querySelectorAll(`[data-focus-group="${action.group}"]`).forEach(peer => {
                  if (peer !== el) { peer.classList.add('is-dimmed'); peer.classList.remove('is-highlighted'); }
                });
              }
            }
            break;
          }
          case 'dim': {
            el.classList.add('is-dimmed'); el.classList.remove('is-highlighted');
            if (isSVG) { el.style.filter = ''; el.style.transition = 'filter 380ms ease, opacity 380ms ease'; }
            break;
          }
        }
      }

      initDrawPath(el) {
        if (el.tagName === 'path' && typeof el.getTotalLength === 'function') {
          const len = Math.ceil(el.getTotalLength());
          el.style.setProperty('--path-length', len);
          el.setAttribute('stroke-dasharray', len);
          el.setAttribute('stroke-dashoffset', len);
        } else if (el.querySelectorAll) {
          el.querySelectorAll('path, line, polyline, polygon, circle, ellipse').forEach(path => {
            if (typeof path.getTotalLength === 'function') {
              const len = Math.ceil(path.getTotalLength());
              path.style.setProperty('--path-length', len);
              path.setAttribute('stroke-dasharray', len);
              path.setAttribute('stroke-dashoffset', len);
              path.style.animation = `drawPath ${parseInt(el.style.animation) || 600}ms ease forwards`;
            }
          });
        }
      }

      scheduleActions(slide) {
        const config = this.getSceneConfig(slide);
        (config?.actions || []).forEach(action => {
          const timer = setTimeout(() => {}, action.enterAt || 0);
          this.actionTimers.push(timer);
        });
      }

      showSlide(index) {
        this.clearTimers();
        this.resetSlideState();
        if (index >= this.slides.length) {
          this.currentIndex = this.slides.length - 1;
          this.updateCounter();
          this.progressBar.style.width = '100%';
          return;
        }
        if (index < 0) index = 0;
        this.currentIndex = index;
        const slide = this.slides[index];
        slide.classList.add('active');
        this.resetSlideStepState(slide);
        this.currentStep = -1;

        slide.querySelectorAll('[data-enter-at]').forEach(element => {
          const timer = setTimeout(() => element.classList.add('visible'), this.getElementEnterAt(element));
          this.elementTimers.push(timer);
        });

        this.scheduleActions(slide);

        const steps = this.getSlideSteps(slide);
        if (steps.length > 0) {
          this.currentStep = 0;
          this.executeStep(slide, 0);
          this.updateCounter();
          if (window.timelineConfig.autoPlay) this.scheduleAutoSteps(slide, 0);
        } else {
          this.updateCounter();
          if (window.timelineConfig.autoPlay) {
            const dur = this.getSlideDuration(slide);
            this.animateProgress(Date.now(), dur);
            this.sceneTimer = setTimeout(() => { this.elapsedTotal += dur; this.showSlide(index + 1); }, dur);
          }
        }
      }

      scheduleAutoSteps(slide, fromStep) {
        const steps = this.getSlideSteps(slide);
        let cum = 0;
        for (let i = fromStep; i < steps.length; i++) {
          if (i > fromStep) {
            cum += (steps[i-1].duration || 800) + this.stepGap;
            const idx = i, d = cum;
            const t = setTimeout(() => {
              if (this.currentIndex !== Array.from(this.slides).indexOf(slide)) return;
              this.currentStep = idx; this.executeStep(slide, idx); this.updateCounter();
            }, d);
            this.stepTimers.push(t);
          }
        }
        const last = steps[steps.length-1];
        const total = cum + (last?.duration || 800) + this.stepGap;
        const td = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--transition-duration')) || 800;
        const t2 = setTimeout(() => {
          if (this.currentIndex !== Array.from(this.slides).indexOf(slide)) return;
          this.elapsedTotal += this.getSlideDuration(slide);
          this.showSlide(this.currentIndex + 1);
        }, total + td);
        this.stepTimers.push(t2);
        this.animateProgress(Date.now(), total + td);
      }

      next() {
        const slide = this.slides[this.currentIndex];
        const steps = this.getSlideSteps(slide);
        if (steps.length > 0 && this.currentStep < steps.length - 1) {
          this.clearTimers();
          this.currentStep++;
          this.executeStep(slide, this.currentStep);
          this.updateCounter();
          if (window.timelineConfig.autoPlay) this.scheduleAutoSteps(slide, this.currentStep);
        } else {
          if (slide) this.elapsedTotal = Math.min(this.totalDuration, this.elapsedTotal + this.getSlideDuration(slide));
          this.showSlide(this.currentIndex + 1);
        }
      }

      prev() {
        const slide = this.slides[this.currentIndex];
        const steps = this.getSlideSteps(slide);
        if (steps.length > 0 && this.currentStep > 0) {
          this.clearTimers();
          this.currentStep--;
          this.resetSlideStepState(slide);
          for (let i = 0; i <= this.currentStep; i++) this.executeStep(slide, i);
          this.updateCounter();
        } else {
          const pi = Math.max(this.currentIndex - 1, 0);
          this.elapsedTotal = this.slides.slice(0, pi).reduce((s, sl) => s + this.getSlideDuration(sl), 0);
          this.clearTimers(); this.resetSlideState();
          this.currentIndex = pi;
          const ps = this.slides[pi]; ps.classList.add('active');
          this.resetSlideStepState(ps);
          ps.querySelectorAll('[data-enter-at]').forEach(el => el.classList.add('visible'));
          const pSteps = this.getSlideSteps(ps);
          if (pSteps.length > 0) {
            this.currentStep = pSteps.length - 1;
            for (let i = 0; i <= this.currentStep; i++) this.executeStep(ps, i);
          } else { this.currentStep = -1; }
          this.updateCounter();
        }
      }

      start() { this.elapsedTotal = 0; this.progressBar.style.width = '0%'; this.showSlide(0); }
      pause() { window.timelineConfig.autoPlay = false; this.clearTimers(); }
      resume() {
        window.timelineConfig.autoPlay = true;
        const slide = this.slides[this.currentIndex];
        const steps = this.getSlideSteps(slide);
        if (steps.length > 0 && this.currentStep < steps.length - 1) {
          this.scheduleAutoSteps(slide, this.currentStep + 1);
        } else if (steps.length === 0) { this.showSlide(this.currentIndex); }
        else {
          const td = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--transition-duration')) || 800;
          this.sceneTimer = setTimeout(() => {
            this.elapsedTotal += this.getSlideDuration(slide);
            this.showSlide(this.currentIndex + 1);
          }, (steps[steps.length-1]?.duration || 800) + td);
        }
      }
    }

    document.addEventListener('DOMContentLoaded', () => { window.timeline = new TimelineEngine(); window.timeline.start(); });
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); window.timeline.next(); }
      if (e.key === 'ArrowLeft') { e.preventDefault(); window.timeline.prev(); }
      if (e.key.toLowerCase() === 'p') window.timeline.pause();
      if (e.key.toLowerCase() === 'r') window.timeline.resume();
    });
  </script>
</body>
</html>
