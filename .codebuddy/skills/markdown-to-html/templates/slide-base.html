<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920">
  <title>__APP_TITLE__</title>
  <style>
    /* ── 核心变量 ── */
    :root {
      --slide-width: 1920px;
      --slide-height: 1080px;
      --transition-duration: 600ms;
      --shot-gap: 300ms;
      --group-transition: 600ms;
      /* 纸浆米白 + 棕绿品牌色系 */
      --color-bg: #FAF3E9;
      --color-bg-strong: #EDE5D5;
      --color-text: #1a1408;
      --color-text-muted: rgba(26, 20, 8, 0.58);
      --color-accent: #7A4F2A;          /* 陶土棕 — 主色 */
      --color-accent-warm: #B8802E;     /* 暖金棕 — 强调 */
      --color-danger: #8B2515;          /* 赤陶红 — 警告/错误 */
      --color-focus: #4A6741;           /* 橄榄绿 — 聚焦/辅助 */
      --font-display: 'Baskerville', 'Noto Serif SC', 'Songti SC', serif;
      --font-body: 'Avenir Next', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }

    /* ── 重置 ── */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── 16:9 固定视口 + 纸浆纹理背景 ── */
    body {
      width: var(--slide-width);
      height: var(--slide-height);
      overflow: hidden;
      color: var(--color-text);
      font-family: var(--font-body);
      background: var(--color-bg) url('paper-texture-bg.png') center/cover no-repeat;
    }

    /* ── 幻灯片切换系统 ── */
    .slideshow {
      position: relative;
      width: 100%;
      height: 100%;
      isolation: isolate;
    }

    .slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--transition-duration) ease;
      overflow: hidden;
    }

    .slide.active {
      opacity: 1;
      pointer-events: auto;
    }

    /* ── 画布组过渡 ── */
    .slide.canvas-group-start {
      /* 画布组起始镜头：清空画布，完整渲染 */
    }

    .slide.canvas-group-continue {
      /* 画布组延续镜头：继承画布，增量变化 */
    }

    /* ── 固定 UI 元素 ── */
    .scene-counter,
    .presentation-tag,
    .control-hint {
      position: fixed;
      z-index: 30;
      backdrop-filter: blur(14px);
      border: 1px solid rgba(42, 34, 24, 0.10);
      background: rgba(250, 243, 233, 0.72);
      color: rgba(42, 34, 24, 0.55);
    }

    .presentation-tag,
    .scene-counter {
      top: 24px;
      padding: 10px 16px;
      border-radius: 999px;
      font-size: 14px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .presentation-tag { left: 24px; }
    .scene-counter { right: 24px; }

    .control-hint {
      left: 24px;
      bottom: 24px;
      padding: 14px 18px;
      border-radius: 18px;
      font-size: 16px;
    }

    /* ── 进度条 ── */
    .progress-track {
      position: fixed;
      left: 24px;
      right: 24px;
      bottom: 18px;
      height: 4px;
      border-radius: 999px;
      background: rgba(42, 34, 24, 0.08);
      overflow: hidden;
      z-index: 25;
    }

    .progress-bar {
      width: 0;
      height: 100%;
      background: linear-gradient(90deg, var(--color-accent), var(--color-accent-warm));
    }

    /* ── 镜头增量渲染元素 ── */
    .shot-enter {
      opacity: 0;
      visibility: hidden;
      transition: opacity 500ms ease, transform 500ms ease;
    }

    .shot-enter.visible {
      opacity: 1;
      visibility: visible;
    }

    .shot-exit {
      transition: opacity 400ms ease, transform 400ms ease;
    }

    .shot-exit.hidden {
      opacity: 0;
      visibility: hidden;
    }

    .shot-morph {
      transition: all 500ms ease;
    }

    /* ── 聚焦状态 ── */
    .is-highlighted {
      transition: transform 380ms ease, opacity 380ms ease, border-color 380ms ease, box-shadow 380ms ease;
    }

    .is-dimmed {
      opacity: 0.4;
      transform: scale(0.985);
      transition: opacity 380ms ease, transform 380ms ease;
    }

    /* ── Step 系统基础（兼容画布组内增量） ── */
    .step-hidden {
      opacity: 0;
      pointer-events: none;
      visibility: hidden;
    }

    .step-entering {
      visibility: visible;
      pointer-events: auto;
    }

    .step-exiting {
      visibility: visible;
      pointer-events: none;
    }

    /* SVG 元素 transform 修正 */
    [data-el] {
      transform-box: fill-box;
      transform-origin: center center;
    }

    /* ── 动画 Keyframes ── */

    /* 入场动画 */
    @keyframes fadeIn {
      from { opacity: 0; visibility: visible; }
      to   { opacity: 1; visibility: visible; }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(24px); visibility: visible; }
      to   { opacity: 1; transform: translateY(0);    visibility: visible; }
    }

    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.7); visibility: visible; }
      to   { opacity: 1; transform: scale(1);   visibility: visible; }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px);  visibility: visible; }
      to   { opacity: 1; transform: translateY(0);     visibility: visible; }
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-30px); visibility: visible; }
      to   { opacity: 1; transform: translateY(0);     visibility: visible; }
    }

    @keyframes slideLeft {
      from { opacity: 0; transform: translateX(40px);  visibility: visible; }
      to   { opacity: 1; transform: translateX(0);     visibility: visible; }
    }

    @keyframes slideRight {
      from { opacity: 0; transform: translateX(-40px); visibility: visible; }
      to   { opacity: 1; transform: translateX(0);     visibility: visible; }
    }

    /* 退场动画 */
    @keyframes fadeOut {
      from { opacity: 1; }
      to   { opacity: 0; visibility: hidden; }
    }

    @keyframes scaleOut {
      from { opacity: 1; transform: scale(1);   }
      to   { opacity: 0; transform: scale(0.7); visibility: hidden; }
    }

    @keyframes slideOutLeft {
      from { opacity: 1; transform: translateX(0);     }
      to   { opacity: 0; transform: translateX(-40px); visibility: hidden; }
    }

    @keyframes slideOutRight {
      from { opacity: 1; transform: translateX(0);    }
      to   { opacity: 0; transform: translateX(40px); visibility: hidden; }
    }

    @keyframes slideOutUp {
      from { opacity: 1; transform: translateY(0);     }
      to   { opacity: 0; transform: translateY(-30px); visibility: hidden; }
    }

    @keyframes slideOutDown {
      from { opacity: 1; transform: translateY(0);    }
      to   { opacity: 0; transform: translateY(30px); visibility: hidden; }
    }

    /* SVG 路径绘制 */
    @keyframes drawPath {
      from { stroke-dashoffset: var(--path-length, 1000); opacity: 1; visibility: visible; }
      to   { stroke-dashoffset: 0;                        opacity: 1; visibility: visible; }
    }

    @keyframes erasePath {
      from { stroke-dashoffset: 0;                        opacity: 1; }
      to   { stroke-dashoffset: var(--path-length, 1000); opacity: 0; visibility: hidden; }
    }

    /* SVG 条形生长 */
    @keyframes growBar {
      from { transform: scaleY(0); opacity: 0; visibility: visible; }
      to   { transform: scaleY(1); opacity: 1; visibility: visible; }
    }

    @keyframes growBarX {
      from { transform: scaleX(0); opacity: 0; visibility: visible; }
      to   { transform: scaleX(1); opacity: 1; visibility: visible; }
    }

    /* 呼吸发光 */
    @keyframes pulseGlow {
      0%, 100% { filter: drop-shadow(0 0 0 transparent); }
      50%      { filter: drop-shadow(0 0 12px var(--color-accent)); }
    }

    /* 数字滚动 */
    @keyframes countUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* 动画延迟工具类 */
    [data-delay="1"] { animation-delay: 200ms; }
    [data-delay="2"] { animation-delay: 400ms; }
    [data-delay="3"] { animation-delay: 600ms; }
    [data-delay="4"] { animation-delay: 800ms; }
    [data-delay="5"] { animation-delay: 1000ms; }
    [data-delay="6"] { animation-delay: 1200ms; }
    [data-delay="7"] { animation-delay: 1400ms; }
    [data-delay="8"] { animation-delay: 1600ms; }
  </style>
</head>
<body>
  <div class="presentation-tag">__PRESENTATION_TAG__</div>
  <div class="scene-counter" id="sceneCounter">1 / 1</div>

  <main class="slideshow" id="slideshow">
__SLIDES__
  </main>

  <div class="control-hint">空格 / → 下一镜头，← 上一镜头，P 暂停，R 继续</div>
  <div class="progress-track"><div class="progress-bar" id="progressBar"></div></div>

  <script>
    window.presentationData = __PRESENTATION_DATA__;
    window.timelineConfig = __TIMELINE_CONFIG__;

    /**
     * ShotTimelineEngine — 镜头蒙太奇时间轴引擎
     *
     * 核心概念：
     * - Shot（镜头）：最小调度单位，每个镜头一个 <section class="slide">
     * - CanvasGroup（画布组）：逻辑分组，组内镜头共享画布做增量渲染
     * - Transition：画布组间做全画面过渡（淡入淡出）
     */
    class ShotTimelineEngine {
      constructor(config) {
        this.shots = config.shots || [];
        this.shotGap = config.shotGap || 300;
        this.groupTransition = config.groupTransition || 600;
        this.autoPlay = config.autoPlay || false;

        this.slides = Array.from(document.querySelectorAll('.slide'));
        this.currentIndex = 0;
        this.timer = null;
        this.progressBar = document.getElementById('progressBar');
        this.counter = document.getElementById('sceneCounter');

        this.totalDuration = this.shots.reduce((sum, shot) => sum + (shot.duration || 3000), 0)
          + (this.shots.length - 1) * this.shotGap
          + this.countGroupTransitions() * this.groupTransition;
        this.elapsedTotal = 0;

        this.updateCounter();
      }

      /* ── 工具方法 ── */

      countGroupTransitions() {
        let count = 0;
        for (let i = 1; i < this.shots.length; i++) {
          if (this.shots[i].canvasGroup !== this.shots[i - 1].canvasGroup) {
            count++;
          }
        }
        return count;
      }

      getShotDuration(index) {
        return this.shots[index]?.duration || 3000;
      }

      getShotTransition(index) {
        if (index === 0) return 'none';
        const current = this.shots[index];
        const prev = this.shots[index - 1];
        if (!current || !prev) return 'none';
        return current.canvasGroup !== prev.canvasGroup ? 'fade' : 'evolve';
      }

      /* ── UI 更新 ── */

      updateCounter() {
        const shot = this.shots[this.currentIndex];
        if (shot) {
          this.counter.textContent = `${this.currentIndex + 1} / ${this.shots.length}`;
        }
      }

      updateProgress() {
        const progress = Math.min(this.elapsedTotal / this.totalDuration, 1);
        this.progressBar.style.width = `${progress * 100}%`;
      }

      /* ── 画布组管理 ── */

      // 获取同一画布组的所有 slide 索引
      getCanvasGroupSlides(canvasGroup) {
        const indices = [];
        for (let i = 0; i < this.shots.length; i++) {
          if (this.shots[i].canvasGroup === canvasGroup) {
            indices.push(i);
          }
        }
        return indices;
      }

      // 画布组切换：淡出所有旧组 slide → 淡入新组第一个 slide
      transitionToNewGroup(newIndex) {
        // 隐藏所有 slide
        this.slides.forEach(slide => {
          slide.classList.remove('active');
        });

        // 显示新 slide
        const newSlide = this.slides[newIndex];
        if (newSlide) {
          // 延迟一帧让淡出生效后再淡入
          setTimeout(() => {
            newSlide.classList.add('active');
            this.activateShotElements(newSlide);
          }, 50);
        }
      }

      // 画布演化：同组内增量渲染
      evolveCanvas(fromIndex, toIndex) {
        const fromSlide = this.slides[fromIndex];
        const toSlide = this.slides[toIndex];

        if (fromSlide) {
          fromSlide.classList.remove('active');
        }

        if (toSlide) {
          toSlide.classList.add('active');
          this.activateShotElements(toSlide);
        }
      }

      // 激活镜头内的元素动画
      activateShotElements(slide) {
        // shot-enter 元素淡入
        slide.querySelectorAll('.shot-enter').forEach(el => {
          el.classList.add('visible');
        });

        // shot-exit 元素淡出
        slide.querySelectorAll('.shot-exit').forEach(el => {
          el.classList.add('hidden');
        });

        // data-el + step-hidden 的元素入场（兼容 step 系统）
        slide.querySelectorAll('[data-el].step-hidden').forEach(el => {
          el.classList.remove('step-hidden');
          el.classList.add('step-entering');
          el.style.visibility = 'visible';
          const anim = el.dataset.animation || 'fadeIn';
          const dur = el.dataset.duration || '600';
          el.style.animation = `${anim} ${dur}ms ease forwards`;
        });
      }

      /* ── 核心导航 ── */

      showShot(index) {
        if (this.timer) {
          clearTimeout(this.timer);
          this.timer = null;
        }

        if (index >= this.shots.length) {
          this.currentIndex = this.shots.length - 1;
          this.updateCounter();
          this.progressBar.style.width = '100%';
          return;
        }

        if (index < 0) index = 0;

        const prevIndex = this.currentIndex;
        this.currentIndex = index;
        const transition = this.getShotTransition(index);

        if (transition === 'fade' || index === 0) {
          // 画布组切换或第一个镜头：全画面过渡
          this.transitionToNewGroup(index);
        } else {
          // 同组演化：增量渲染
          this.evolveCanvas(prevIndex, index);
        }

        this.updateCounter();
        this.updateProgress();

        // 自动播放
        if (this.autoPlay) {
          const duration = this.getShotDuration(index);
          const nextTransition = this.getShotTransition(index + 1);
          const gap = nextTransition === 'fade' ? this.groupTransition : this.shotGap;

          this.timer = setTimeout(() => {
            this.elapsedTotal += duration + gap;
            this.showShot(index + 1);
          }, duration + gap);
        }
      }

      next() {
        const duration = this.getShotDuration(this.currentIndex);
        const nextTransition = this.getShotTransition(this.currentIndex + 1);
        const gap = nextTransition === 'fade' ? this.groupTransition : this.shotGap;
        this.elapsedTotal += duration + gap;
        this.showShot(this.currentIndex + 1);
      }

      prev() {
        const prevIndex = Math.max(this.currentIndex - 1, 0);
        // 回算 elapsed
        if (prevIndex < this.currentIndex) {
          const prevDuration = this.getShotDuration(prevIndex);
          const prevTransition = this.getShotTransition(this.currentIndex);
          const gap = prevTransition === 'fade' ? this.groupTransition : this.shotGap;
          this.elapsedTotal = Math.max(0, this.elapsedTotal - prevDuration - gap);
        }
        this.showShot(prevIndex);
      }

      /* ── 播放控制 ── */

      start() {
        this.elapsedTotal = 0;
        this.progressBar.style.width = '0%';
        this.showShot(0);
      }

      pause() {
        this.autoPlay = false;
        if (this.timer) {
          clearTimeout(this.timer);
          this.timer = null;
        }
      }

      resume() {
        this.autoPlay = true;
        const duration = this.getShotDuration(this.currentIndex);
        // 简单处理：立即切下一个镜头（假设当前已观看完）
        this.timer = setTimeout(() => {
          this.elapsedTotal += duration + this.shotGap;
          this.showShot(this.currentIndex + 1);
        }, this.shotGap);
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      window.timeline = new ShotTimelineEngine(window.timelineConfig);
      window.timeline.start();
    });

    document.addEventListener('keydown', event => {
      if (event.key === 'ArrowRight' || event.key === ' ') { event.preventDefault(); window.timeline.next(); }
      if (event.key === 'ArrowLeft') { event.preventDefault(); window.timeline.prev(); }
      if (event.key.toLowerCase() === 'p') window.timeline.pause();
      if (event.key.toLowerCase() === 'r') window.timeline.resume();
    });
  </script>
</body>
</html>
