default: qwen3-local

providers:
  qwen3-local:
    type: local
    model_path: .models/Qwen3-TTS-12Hz-0.6B-Base
    sample_rate: 24000
    format: wav
    language: chinese
    # Base 模型通过声音克隆生成语音，必须提供参考音频和参考文本
    # ref_audio: 参考音频文件路径（相对项目根目录），支持 wav/mp3
    # ref_text:  参考音频对应的文字内容（必填，用于声音克隆对齐）
    ref_audio: assets/ref-voice/speaker.wav
    ref_text: "参考音频中说的文字内容"

  minimax:
    type: api
    endpoint: https://api.minimax.chat/v1/tts
    api_key_env: MINIMAX_API_KEY
    format: mp3

  mimo-v2:
    type: api
    endpoint: https://api.mimo.ai/v2/tts
    api_key_env: MIMO_API_KEY
    format: wav
