<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920">
  <title>__APP_TITLE__</title>
  <style>
    :root {
      --slide-width: 1920px;
      --slide-height: 1080px;
      --transition-duration: 800ms;
      --color-bg: #07111d;
      --color-bg-strong: #050a12;
      --color-panel: rgba(10, 21, 36, 0.74);
      --color-panel-strong: rgba(8, 18, 31, 0.9);
      --color-line: rgba(255, 255, 255, 0.09);
      --color-text: #eff5ff;
      --color-text-muted: rgba(239, 245, 255, 0.72);
      --color-accent: #79e8ff;
      --color-accent-warm: #ff9f72;
      --color-focus: #b8f4ff;
      --shadow-soft: 0 26px 72px rgba(0, 0, 0, 0.34);
      --font-display: 'Baskerville', 'Times New Roman', serif;
      --font-body: 'Avenir Next', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: var(--slide-width);
      height: var(--slide-height);
      overflow: hidden;
      color: var(--color-text);
      font-family: var(--font-body);
      background:
        radial-gradient(circle at 18% 20%, rgba(121, 232, 255, 0.16), transparent 24%),
        radial-gradient(circle at 82% 18%, rgba(255, 159, 114, 0.14), transparent 20%),
        linear-gradient(150deg, #07111d 0%, #09192b 52%, #04070d 100%);
    }

    .slideshow {
      position: relative;
      width: 100%;
      height: 100%;
      isolation: isolate;
    }

    .slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--transition-duration) ease;
      overflow: hidden;
    }

    .slide.active {
      opacity: 1;
      pointer-events: auto;
    }

    .slide::before,
    .slide::after {
      content: '';
      position: absolute;
      border-radius: 999px;
      filter: blur(20px);
      opacity: 0.36;
      z-index: 0;
    }

    .slide::before {
      width: 420px;
      height: 420px;
      top: -140px;
      right: -80px;
      background: radial-gradient(circle, rgba(121, 232, 255, 0.38), transparent 70%);
    }

    .slide::after {
      width: 360px;
      height: 360px;
      bottom: -120px;
      left: -70px;
      background: radial-gradient(circle, rgba(255, 159, 114, 0.24), transparent 72%);
    }

    .slide-shell {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      padding: 68px 76px 78px;
      display: grid;
    }

    .footer-note,
    .scene-counter,
    .presentation-tag,
    .control-hint {
      position: fixed;
      z-index: 30;
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(7, 16, 28, 0.44);
      color: rgba(255,255,255,0.66);
    }

    .footer-note {
      right: 28px;
      top: 72px;
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 14px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .presentation-tag,
    .scene-counter {
      top: 24px;
      padding: 10px 16px;
      border-radius: 999px;
      font-size: 14px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .presentation-tag { left: 24px; }
    .scene-counter { right: 24px; }

    .control-hint {
      left: 24px;
      bottom: 24px;
      padding: 14px 18px;
      border-radius: 18px;
      font-size: 16px;
    }

    .progress-track {
      position: fixed;
      left: 24px;
      right: 24px;
      bottom: 18px;
      height: 4px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      overflow: hidden;
      z-index: 25;
    }

    .progress-bar {
      width: 0;
      height: 100%;
      background: linear-gradient(90deg, var(--color-accent), var(--color-accent-warm));
    }

    .slide-layout {
      position: relative;
      width: 100%;
      height: 100%;
      min-height: 0;
      display: grid;
      gap: 24px;
      align-items: stretch;
    }

    .slide-layout > * {
      min-width: 0;
      min-height: 0;
    }

    .slide-layout--triad {
      grid-template-columns: minmax(360px, 430px) minmax(0, 1fr) minmax(300px, 340px);
      grid-template-rows: minmax(0, 1fr);
    }

    .slide-layout--detail-typed {
      grid-template-columns: minmax(0, 0.95fr) minmax(0, 1.05fr) minmax(300px, 340px);
      grid-template-rows: auto minmax(0, 1fr);
    }

    .slide-layout--detail-typed .slide-copy {
      grid-column: 1 / -1;
      padding-top: 0;
    }

    .slide-layout--fallback-summary {
      grid-template-columns: minmax(0, 1.05fr) minmax(0, 0.95fr);
      grid-auto-rows: min-content;
      align-items: start;
    }

    .slide-layout--fallback-summary .subtitle-panel--wide {
      grid-column: 1 / -1;
      justify-self: center;
    }

    .slide-layout--fallback-visual {
      grid-template-columns: minmax(360px, 420px) minmax(0, 1fr) minmax(0, 0.82fr);
      grid-template-rows: auto minmax(0, 1fr);
      align-items: start;
    }

    .slide-layout--fallback-visual .subtitle-panel--wide {
      grid-column: 2 / -1;
    }

    .slide-copy {
      display: grid;
      gap: 18px;
      align-content: start;
      padding-top: 24px;
      min-width: 0;
    }

    .slide-copy--wide {
      justify-items: center;
      text-align: center;
      padding-top: 48px;
    }

    .slide-copy--summary-lead {
      justify-items: start;
      text-align: left;
      padding-top: 20px;
      align-self: start;
    }

    .slide-copy--detail-header {
      grid-column: 1 / -1;
      gap: 14px;
      padding-top: 0;
    }

    .eyebrow,
    .meta-chip,
    .tag-chip {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.04);
      width: fit-content;
      color: rgba(255,255,255,0.78);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-size: 14px;
      backdrop-filter: blur(12px);
    }

    .meta-chip-row,
    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .eyebrow::before {
      content: '';
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--color-accent);
      box-shadow: 0 0 18px rgba(121, 232, 255, 0.66);
    }

    .plan-title {
      font-family: var(--font-display);
      font-size: 68px;
      line-height: 1.02;
      letter-spacing: -0.04em;
      max-width: 13ch;
      text-wrap: balance;
    }

    .slide-copy--detail-header .plan-title,
    .slide-copy--wide .plan-title {
      max-width: min(23ch, 100%);
    }

    .slide[data-title-size="hero"] .plan-title { font-size: 100px; }
    .slide[data-title-size="xl"] .plan-title { font-size: 80px; }
    .slide[data-title-size="lg"] .plan-title { font-size: 68px; }
    .slide[data-title-size="md"] .plan-title { font-size: 58px; }
    .slide[data-title-size="sm"] .plan-title { font-size: 48px; }

    .plan-deck {
      font-size: 23px;
      line-height: 1.5;
      color: var(--color-text-muted);
      max-width: 24ch;
    }

    .slide-copy--detail-header .plan-deck,
    .slide-copy--wide .plan-deck {
      max-width: min(34ch, 100%);
    }

    .content-surface,
    .detail-focus,
    .fallback-panel,
    .support-panel,
    .subtitle-panel,
    .insight-panel,
    .visual-frame {
      border-radius: 34px;
      background: var(--color-panel);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(16px);
    }

    .content-surface,
    .support-panel,
    .subtitle-panel,
    .insight-panel,
    .visual-frame {
      padding: 22px;
      min-height: 0;
      overflow: hidden;
    }

    .support-panel,
    .subtitle-panel,
    .insight-panel,
    .visual-frame,
    .fallback-panel {
      display: grid;
      gap: 12px;
      align-content: start;
    }

    .support-panel--compact {
      align-self: start;
    }

    .support-panel--compact .insight-panel,
    .support-panel--compact .subtitle-panel {
      padding: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
      backdrop-filter: none;
    }

    .support-panel--compact .subtitle-stack,
    .support-panel--compact .insight-list {
      gap: 8px;
    }

    .support-panel--compact .subtitle-line {
      grid-template-columns: 28px 1fr;
      gap: 10px;
    }

    .flow-grid,
    .card-grid,
    .context-grid,
    .timeline-detail-stack,
    .subtitle-stack,
    .summary-stack {
      display: grid;
      gap: 14px;
    }

    .flow-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
      align-content: start;
      height: 100%;
    }

    .card-grid--keypoints {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      align-content: start;
      height: 100%;
    }

    .context-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
      align-content: start;
    }

    .context-grid--fallback,
    .context-grid--keypoints-detail {
      grid-template-columns: 1fr;
    }

    .timeline-detail-stack {
      align-content: start;
      height: 100%;
    }

    .plan-card,
    .timeline-item,
    .context-card,
    .detail-focus {
      position: relative;
      transition: transform 380ms ease, opacity 380ms ease, border-color 380ms ease, box-shadow 380ms ease, background 380ms ease;
    }

    .plan-card,
    .context-card {
      padding: 20px;
      border-radius: 26px;
      background: rgba(8, 18, 31, 0.88);
      border: 1px solid rgba(255,255,255,0.08);
      display: grid;
      gap: 10px;
      align-content: start;
    }

    .plan-card--priority,
    .timeline-item--priority,
    .detail-focus--flow,
    .detail-focus--timeline,
    .detail-focus--keypoint {
      border-color: rgba(121, 232, 255, 0.3);
      box-shadow: 0 20px 54px rgba(7, 20, 36, 0.42);
    }

    .plan-card h3,
    .detail-focus h3,
    .timeline-item h3,
    .context-card h4,
    .support-panel h3 {
      font-size: 24px;
      line-height: 1.18;
    }

    .plan-card p,
    .detail-focus p,
    .timeline-item p,
    .context-card p,
    .fallback-line,
    .support-panel p,
    .visual-frame p,
    .subtitle-line p,
    .insight-list li {
      font-size: 18px;
      line-height: 1.46;
      color: rgba(239, 245, 255, 0.76);
    }

    .support-panel--compact .subtitle-line p,
    .support-panel--compact .insight-list li,
    .panel-truncation-note {
      font-size: 15px;
      line-height: 1.42;
    }

    .plan-card-index,
    .context-label,
    .detail-kicker,
    .timeline-index,
    .line-label,
    .panel-kicker,
    .subtitle-index,
    .signal-chip span {
      font-size: 13px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(239, 245, 255, 0.46);
    }

    .panel-kicker {
      margin-bottom: 2px;
    }

    .plan-card--flow {
      min-height: 176px;
    }

    .plan-card--keypoint {
      min-height: 192px;
    }

    .timeline-stack {
      position: relative;
      display: grid;
      gap: 12px;
      height: 100%;
      align-content: start;
      padding-left: 30px;
    }

    .timeline-stack::before,
    .timeline-detail-stack::before {
      content: '';
      position: absolute;
      left: 10px;
      top: 0;
      bottom: 0;
      width: 2px;
      background: linear-gradient(180deg, rgba(121,232,255,0.45), rgba(255,159,114,0.24));
    }

    .timeline-detail-stack {
      position: relative;
      padding-left: 30px;
    }

    .timeline-item {
      display: grid;
      grid-template-columns: 22px 1fr;
      gap: 12px;
      padding: 14px 18px;
      border-radius: 22px;
      background: rgba(8, 18, 31, 0.84);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: var(--shadow-soft);
      margin-left: calc(var(--indent-level, 0) * 28px);
    }

    .timeline-item--detail {
      margin-left: 0;
    }

    .timeline-item[data-level="1"] { margin-left: 28px; }
    .timeline-item[data-level="2"] { margin-left: 56px; }
    .timeline-item[data-level="3"] { margin-left: 84px; }
    .timeline-item[data-level="4"] { margin-left: 112px; }
    .timeline-item[data-level="5"] { margin-left: 140px; }

    .timeline-dot {
      width: 12px;
      height: 12px;
      margin-top: 7px;
      border-radius: 999px;
      background: var(--color-accent);
      box-shadow: 0 0 18px rgba(121,232,255,0.6);
    }

    .status-warn .timeline-dot { background: #ffc182; box-shadow: 0 0 18px rgba(255,193,130,0.6); }
    .status-error .timeline-dot,
    .status-critical .timeline-dot { background: #ff8787; box-shadow: 0 0 18px rgba(255,135,135,0.56); }

    .detail-focus {
      padding: 24px 28px;
      display: grid;
      gap: 12px;
      align-content: start;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02)),
        var(--color-panel-strong);
    }

    .fallback-panel {
      width: 100%;
      padding: 26px 28px;
    }

    .fallback-panel--summary {
      align-self: start;
      min-height: 0;
    }

    .signal-strip {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .signal-chip {
      display: grid;
      gap: 4px;
      padding: 10px 12px;
      border-radius: 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
    }

    .signal-chip strong {
      font-size: 18px;
      font-weight: 600;
      color: var(--color-text);
    }

    .subtitle-line {
      display: grid;
      grid-template-columns: 30px 1fr;
      gap: 10px;
      align-items: start;
    }

    .subtitle-index {
      padding-top: 3px;
    }

    .subtitle-panel--wide {
      width: min(1120px, 100%);
    }

    .summary-stack {
      gap: 14px;
    }

    .support-panel {
      align-self: stretch;
      height: 100%;
    }

    .visual-frame {
      align-self: start;
    }

    .insight-list {
      padding-left: 18px;
      display: grid;
      gap: 10px;
    }

    .panel-truncation-note {
      color: rgba(239, 245, 255, 0.54);
      letter-spacing: 0.04em;
      list-style: none;
    }

    .plan-card.is-highlighted,
    .timeline-item.is-highlighted,
    .context-card.is-highlighted,
    .detail-focus.is-highlighted {
      transform: translateY(-8px) scale(1.01);
      border-color: rgba(184, 244, 255, 0.46);
      background: rgba(13, 30, 49, 0.96);
      box-shadow: 0 28px 90px rgba(6, 18, 34, 0.54);
    }

    .plan-card.is-dimmed,
    .timeline-item.is-dimmed,
    .context-card.is-dimmed,
    .detail-focus.is-dimmed {
      opacity: 0.4;
      transform: scale(0.985);
    }

    [data-enter-at] {
      opacity: 0;
      transform: translateY(24px) scale(0.985);
      transition: opacity 680ms ease, transform 680ms ease;
    }

    [data-enter-at].visible {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
  </style>
</head>
<body>
  <div class="presentation-tag">presentation planner · phase 2</div>
  <div class="scene-counter" id="sceneCounter">1 / 1</div>

  <main class="slideshow" id="slideshow">
__SLIDES__
  </main>

  <div class="control-hint">空格 / → 下一页，← 上一页，P 暂停，R 继续</div>
  <div class="progress-track"><div class="progress-bar" id="progressBar"></div></div>

  <script>
    window.presentationData = __PRESENTATION_DATA__;
    window.timelineConfig = __TIMELINE_CONFIG__;

    class TimelineEngine {
      constructor() {
        this.slides = Array.from(document.querySelectorAll('.slide'));
        this.currentIndex = 0;
        this.sceneTimer = null;
        this.elementTimers = [];
        this.actionTimers = [];
        this.progressBar = document.getElementById('progressBar');
        this.counter = document.getElementById('sceneCounter');
        this.totalDuration = this.slides.reduce((sum, slide) => sum + this.getSlideDuration(slide), 0);
        this.elapsedTotal = 0;
        this.updateCounter();
      }

      getSceneConfig(slide) {
        const sceneId = Number(slide.dataset.scene);
        return (window.timelineConfig.scenes || []).find(item => item.scene === sceneId) || null;
      }

      getSlideDuration(slide) {
        return this.getSceneConfig(slide)?.duration ?? Number(slide.dataset.duration) ?? 10000;
      }

      getElementEnterAt(element, slide) {
        return Number(element.dataset.enterAt) || 0;
      }

      clearTimers() {
        if (this.sceneTimer) clearTimeout(this.sceneTimer);
        this.elementTimers.forEach(timer => clearTimeout(timer));
        this.actionTimers.forEach(timer => clearTimeout(timer));
        this.elementTimers = [];
        this.actionTimers = [];
      }

      resetSlideState() {
        this.slides.forEach(slide => {
          slide.classList.remove('active');
          slide.querySelectorAll('[data-enter-at]').forEach(element => element.classList.remove('visible'));
          slide.querySelectorAll('.is-highlighted, .is-dimmed').forEach(element => {
            element.classList.remove('is-highlighted', 'is-dimmed');
          });
        });
      }

      updateCounter() {
        this.counter.textContent = `${Math.min(this.currentIndex + 1, this.slides.length)} / ${this.slides.length}`;
      }

      animateProgress(startTime, duration) {
        const loop = () => {
          const elapsed = Date.now() - startTime;
          const totalProgress = Math.min((this.elapsedTotal + elapsed) / this.totalDuration, 1);
          this.progressBar.style.width = `${totalProgress * 100}%`;
          if (elapsed < duration) requestAnimationFrame(loop);
        };
        requestAnimationFrame(loop);
      }

      queryActionTargets(slide, target) {
        if (!target) return [];
        if (target.selector) return Array.from(slide.querySelectorAll(target.selector));
        if (target.focusId) {
          return Array.from(slide.querySelectorAll(`[data-step-target="${target.focusId}"]`));
        }
        return [];
      }

      resetFocusGroup(slide, groupName) {
        if (!groupName) return;
        slide.querySelectorAll(`[data-focus-group="${groupName}"]`).forEach(element => {
          element.classList.remove('is-highlighted', 'is-dimmed');
        });
      }

      applyAction(action, slide) {
        const targets = this.queryActionTargets(slide, action.target);
        const groupName = action.target?.group;

        if (action.actionType === 'focus-item' || action.actionType === 'highlight') {
          if (action.payload?.resetGroup !== false) {
            this.resetFocusGroup(slide, groupName);
          }

          const groupElements = groupName
            ? Array.from(slide.querySelectorAll(`[data-focus-group="${groupName}"]`))
            : [];

          groupElements.forEach(element => element.classList.add('is-dimmed'));
          targets.forEach(element => {
            element.classList.add('is-highlighted');
            element.classList.remove('is-dimmed');
          });
          return;
        }

        if (action.actionType === 'dim-others') {
          const groupElements = groupName
            ? Array.from(slide.querySelectorAll(`[data-focus-group="${groupName}"]`))
            : [];
          groupElements.forEach(element => element.classList.add('is-dimmed'));
          targets.forEach(element => element.classList.remove('is-dimmed'));
          return;
        }

        if (action.actionType === 'reveal') {
          targets.forEach(element => element.classList.add('visible'));
        }
      }

      scheduleActions(slide) {
        const config = this.getSceneConfig(slide);
        (config?.actions || []).forEach(action => {
          const timer = setTimeout(() => this.applyAction(action, slide), action.enterAt || 0);
          this.actionTimers.push(timer);
        });
      }

      showSlide(index) {
        this.clearTimers();
        this.resetSlideState();

        if (index >= this.slides.length) {
          this.currentIndex = this.slides.length - 1;
          this.updateCounter();
          this.progressBar.style.width = '100%';
          return;
        }

        if (index < 0) index = 0;
        this.currentIndex = index;
        const slide = this.slides[index];
        slide.classList.add('active');
        this.updateCounter();

        slide.querySelectorAll('[data-enter-at]').forEach(element => {
          const enterAt = this.getElementEnterAt(element, slide);
          const timer = setTimeout(() => element.classList.add('visible'), enterAt);
          this.elementTimers.push(timer);
        });

        this.scheduleActions(slide);

        if (window.timelineConfig.autoPlay) {
          const duration = this.getSlideDuration(slide);
          const startTime = Date.now();
          this.animateProgress(startTime, duration);
          this.sceneTimer = setTimeout(() => {
            this.elapsedTotal += duration;
            this.showSlide(index + 1);
          }, duration);
        }
      }

      start() {
        this.elapsedTotal = 0;
        this.progressBar.style.width = '0%';
        this.showSlide(0);
      }

      next() {
        const current = this.slides[this.currentIndex];
        if (current) {
          this.elapsedTotal = Math.min(this.totalDuration, this.elapsedTotal + this.getSlideDuration(current));
        }
        this.showSlide(this.currentIndex + 1);
      }

      prev() {
        const prevIndex = Math.max(this.currentIndex - 1, 0);
        this.elapsedTotal = this.slides
          .slice(0, prevIndex)
          .reduce((sum, slide) => sum + this.getSlideDuration(slide), 0);
        this.showSlide(prevIndex);
      }

      pause() {
        window.timelineConfig.autoPlay = false;
        this.clearTimers();
      }

      resume() {
        window.timelineConfig.autoPlay = true;
        this.showSlide(this.currentIndex);
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      window.timeline = new TimelineEngine();
      window.timeline.start();
    });

    document.addEventListener('keydown', event => {
      if (event.key === 'ArrowRight' || event.key === ' ') window.timeline.next();
      if (event.key === 'ArrowLeft') window.timeline.prev();
      if (event.key.toLowerCase() === 'p') window.timeline.pause();
      if (event.key.toLowerCase() === 'r') window.timeline.resume();
    });
  </script>
</body>
</html>
