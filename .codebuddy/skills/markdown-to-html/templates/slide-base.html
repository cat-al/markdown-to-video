<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920">
  <title>__APP_TITLE__</title>
  <style>
    /* ── 核心变量 ── */
    :root {
      --slide-width: 1920px;
      --slide-height: 1080px;
      --transition-duration: 800ms;
      /* 纸浆米白 + 棕绿品牌色系 */
      --color-bg: #FAF3E9;
      --color-bg-strong: #F0E8DA;
      --color-text: #2a2218;
      --color-text-muted: rgba(42, 34, 24, 0.58);
      --color-accent: #A8703F;          /* 陶土棕 — 主色 */
      --color-accent-warm: #C4923C;     /* 暖金棕 — 强调 */
      --color-danger: #a33020;          /* 赤陶红 — 警告/错误 */
      --color-focus: #5C614D;           /* 橄榄深绿 — 聚焦/辅助 */
      --font-display: 'Baskerville', 'Noto Serif SC', 'Songti SC', serif;
      --font-body: 'Avenir Next', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }

    /* ── 重置 ── */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── 16:9 固定视口 + 纸浆纹理背景 ── */
    body {
      width: var(--slide-width);
      height: var(--slide-height);
      overflow: hidden;
      color: var(--color-text);
      font-family: var(--font-body);
      background: var(--color-bg) url('paper-texture-bg.png') center/cover no-repeat;
    }

    /* ── 幻灯片切换系统 ── */
    .slideshow {
      position: relative;
      width: 100%;
      height: 100%;
      isolation: isolate;
    }

    .slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--transition-duration) ease;
      overflow: hidden;
    }

    .slide.active {
      opacity: 1;
      pointer-events: auto;
    }

    /* ── 固定 UI 元素 ── */
    .scene-counter,
    .presentation-tag,
    .control-hint {
      position: fixed;
      z-index: 30;
      backdrop-filter: blur(14px);
      border: 1px solid rgba(42, 34, 24, 0.10);
      background: rgba(250, 243, 233, 0.72);
      color: rgba(42, 34, 24, 0.55);
    }

    .presentation-tag,
    .scene-counter {
      top: 24px;
      padding: 10px 16px;
      border-radius: 999px;
      font-size: 14px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .presentation-tag { left: 24px; }
    .scene-counter { right: 24px; }

    .control-hint {
      left: 24px;
      bottom: 24px;
      padding: 14px 18px;
      border-radius: 18px;
      font-size: 16px;
    }

    /* ── 进度条 ── */
    .progress-track {
      position: fixed;
      left: 24px;
      right: 24px;
      bottom: 18px;
      height: 4px;
      border-radius: 999px;
      background: rgba(42, 34, 24, 0.08);
      overflow: hidden;
      z-index: 25;
    }

    .progress-bar {
      width: 0;
      height: 100%;
      background: linear-gradient(90deg, var(--color-accent), var(--color-accent-warm));
    }

    /* ── 渐进揭示基础 ── */
    [data-enter-at] {
      opacity: 0;
      transform: translateY(24px) scale(0.985);
      transition: opacity 680ms ease, transform 680ms ease;
    }

    [data-enter-at].visible {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    /* ── 聚焦状态 ── */
    .is-highlighted {
      transition: transform 380ms ease, opacity 380ms ease, border-color 380ms ease, box-shadow 380ms ease;
    }

    .is-dimmed {
      opacity: 0.4;
      transform: scale(0.985);
      transition: opacity 380ms ease, transform 380ms ease;
    }

    /* ── Step 系统基础 ── */
    .step-hidden {
      opacity: 0;
      pointer-events: none;
      visibility: hidden;          /* SVG 元素需要 visibility 配合 */
    }

    .step-entering {
      visibility: visible;
      pointer-events: auto;
    }

    .step-exiting {
      visibility: visible;         /* 退场动画播放期间保持可见 */
      pointer-events: none;
    }

    /* SVG 元素 transform 修正：让 scale/rotate 基于元素自身中心而非 SVG 视口原点 */
    [data-el] {
      transform-box: fill-box;
      transform-origin: center center;
    }

    /* ── 动画 Keyframes ── */

    /* 入场动画（通用 + SVG 兼容） */
    @keyframes fadeIn {
      from { opacity: 0; visibility: visible; }
      to   { opacity: 1; visibility: visible; }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(24px); visibility: visible; }
      to   { opacity: 1; transform: translateY(0);    visibility: visible; }
    }

    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.7); visibility: visible; }
      to   { opacity: 1; transform: scale(1);   visibility: visible; }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px);  visibility: visible; }
      to   { opacity: 1; transform: translateY(0);     visibility: visible; }
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-30px); visibility: visible; }
      to   { opacity: 1; transform: translateY(0);     visibility: visible; }
    }

    @keyframes slideLeft {
      from { opacity: 0; transform: translateX(40px);  visibility: visible; }
      to   { opacity: 1; transform: translateX(0);     visibility: visible; }
    }

    @keyframes slideRight {
      from { opacity: 0; transform: translateX(-40px); visibility: visible; }
      to   { opacity: 1; transform: translateX(0);     visibility: visible; }
    }

    /* 退场动画 */
    @keyframes fadeOut {
      from { opacity: 1; }
      to   { opacity: 0; visibility: hidden; }
    }

    @keyframes scaleOut {
      from { opacity: 1; transform: scale(1);   }
      to   { opacity: 0; transform: scale(0.7); visibility: hidden; }
    }

    @keyframes slideOutLeft {
      from { opacity: 1; transform: translateX(0);     }
      to   { opacity: 0; transform: translateX(-40px); visibility: hidden; }
    }

    @keyframes slideOutRight {
      from { opacity: 1; transform: translateX(0);    }
      to   { opacity: 0; transform: translateX(40px); visibility: hidden; }
    }

    @keyframes slideOutUp {
      from { opacity: 1; transform: translateY(0);     }
      to   { opacity: 0; transform: translateY(-30px); visibility: hidden; }
    }

    @keyframes slideOutDown {
      from { opacity: 1; transform: translateY(0);    }
      to   { opacity: 0; transform: translateY(30px); visibility: hidden; }
    }

    /* SVG 路径绘制（stroke-dashoffset 过渡） */
    @keyframes drawPath {
      from { stroke-dashoffset: var(--path-length, 1000); opacity: 1; visibility: visible; }
      to   { stroke-dashoffset: 0;                        opacity: 1; visibility: visible; }
    }

    /* SVG 路径擦除（反向绘制） */
    @keyframes erasePath {
      from { stroke-dashoffset: 0;                        opacity: 1; }
      to   { stroke-dashoffset: var(--path-length, 1000); opacity: 0; visibility: hidden; }
    }

    /* SVG 条形生长（用于柱状图/条形图） */
    @keyframes growBar {
      from { transform: scaleY(0); opacity: 0; visibility: visible; }
      to   { transform: scaleY(1); opacity: 1; visibility: visible; }
    }

    @keyframes growBarX {
      from { transform: scaleX(0); opacity: 0; visibility: visible; }
      to   { transform: scaleX(1); opacity: 1; visibility: visible; }
    }

    /* 呼吸发光（强调） */
    @keyframes pulseGlow {
      0%, 100% { filter: drop-shadow(0 0 0 transparent); }
      50%      { filter: drop-shadow(0 0 12px var(--color-accent)); }
    }

    /* 数字滚动辅助 */
    @keyframes countUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* 动画延迟工具类 */
    [data-delay="1"] { animation-delay: 200ms; }
    [data-delay="2"] { animation-delay: 400ms; }
    [data-delay="3"] { animation-delay: 600ms; }
    [data-delay="4"] { animation-delay: 800ms; }
    [data-delay="5"] { animation-delay: 1000ms; }
    [data-delay="6"] { animation-delay: 1200ms; }
    [data-delay="7"] { animation-delay: 1400ms; }
    [data-delay="8"] { animation-delay: 1600ms; }
  </style>
</head>
<body>
  <div class="presentation-tag">__PRESENTATION_TAG__</div>
  <div class="scene-counter" id="sceneCounter">1 / 1</div>

  <main class="slideshow" id="slideshow">
__SLIDES__
  </main>

  <div class="control-hint">空格 / → 下一步，← 上一步，P 暂停，R 继续</div>
  <div class="progress-track"><div class="progress-bar" id="progressBar"></div></div>

  <script>
    window.presentationData = __PRESENTATION_DATA__;
    window.timelineConfig = __TIMELINE_CONFIG__;
    window.stepConfig = __STEP_CONFIG__;

    class TimelineEngine {
      constructor() {
        this.slides = Array.from(document.querySelectorAll('.slide'));
        this.currentIndex = 0;
        this.sceneTimer = null;
        this.elementTimers = [];
        this.actionTimers = [];
        this.stepTimers = [];
        this.progressBar = document.getElementById('progressBar');
        this.counter = document.getElementById('sceneCounter');
        this.totalDuration = this.slides.reduce((sum, slide) => sum + this.getSlideDuration(slide), 0);
        this.elapsedTotal = 0;
        this.stepGap = 600; // step 之间的间隔（ms）

        // Step 子系统
        this.currentStep = -1;

        this.updateCounter();
      }

      /* ── 场景配置 ── */

      getSceneConfig(slide) {
        const sceneId = Number(slide.dataset.scene);
        return (window.timelineConfig.scenes || []).find(item => item.scene === sceneId) || null;
      }

      getSlideDuration(slide) {
        return this.getSceneConfig(slide)?.duration ?? Number(slide.dataset.duration) ?? 10000;
      }

      getElementEnterAt(element, slide) {
        return Number(element.dataset.enterAt) || 0;
      }

      /* ── Step 配置 ── */

      getSlideSteps(slide) {
        const sceneId = slide.dataset.scene;
        return window.stepConfig[`slide-${sceneId}`] || [];
      }

      hasSteps(slide) {
        return this.getSlideSteps(slide).length > 0;
      }

      /* ── 定时器管理 ── */

      clearTimers() {
        if (this.sceneTimer) clearTimeout(this.sceneTimer);
        this.elementTimers.forEach(timer => clearTimeout(timer));
        this.actionTimers.forEach(timer => clearTimeout(timer));
        this.stepTimers.forEach(timer => clearTimeout(timer));
        this.elementTimers = [];
        this.actionTimers = [];
        this.stepTimers = [];
      }

      /* ── 状态重置 ── */

      resetSlideState() {
        this.slides.forEach(slide => {
          slide.classList.remove('active');
          slide.querySelectorAll('[data-enter-at]').forEach(element => element.classList.remove('visible'));
          slide.querySelectorAll('.is-highlighted, .is-dimmed').forEach(element => {
            element.classList.remove('is-highlighted', 'is-dimmed');
          });
        });
      }

      resetSlideStepState(slide) {
        slide.querySelectorAll('[data-el]').forEach(el => {
          el.classList.add('step-hidden');
          el.classList.remove('step-entering', 'step-exiting', 'is-highlighted', 'is-dimmed');
          el.style.animation = '';
          el.style.transform = '';
          el.style.transition = '';
          el.style.opacity = '';
          el.style.visibility = '';
          el.style.filter = '';
          // 还原 SVG path 的 stroke-dashoffset
          if (el.hasAttribute('stroke-dashoffset') || el.style.strokeDashoffset) {
            const pathLen = el.style.getPropertyValue('--path-length') || el.getAttribute('stroke-dasharray');
            if (pathLen) {
              el.style.strokeDashoffset = pathLen;
            }
          }
          // 还原通过 morph 修改的 SVG 属性
          if (el._originalAttrs) {
            for (const [attr, val] of Object.entries(el._originalAttrs)) {
              el.setAttribute(attr, val);
            }
            delete el._originalAttrs;
          }
        });
      }

      /* ── UI 更新 ── */

      updateCounter() {
        const slide = this.slides[this.currentIndex];
        const steps = this.getSlideSteps(slide);
        if (steps.length > 0) {
          const stepDisplay = Math.max(0, this.currentStep) + 1;
          this.counter.textContent = `${this.currentIndex + 1}.${stepDisplay} / ${this.slides.length}`;
        } else {
          this.counter.textContent = `${Math.min(this.currentIndex + 1, this.slides.length)} / ${this.slides.length}`;
        }
      }

      animateProgress(startTime, duration) {
        const loop = () => {
          const elapsed = Date.now() - startTime;
          const totalProgress = Math.min((this.elapsedTotal + elapsed) / this.totalDuration, 1);
          this.progressBar.style.width = `${totalProgress * 100}%`;
          if (elapsed < duration) requestAnimationFrame(loop);
        };
        requestAnimationFrame(loop);
      }

      /* ── Step 动作执行 ── */

      executeStep(slide, stepIndex) {
        const steps = this.getSlideSteps(slide);
        if (stepIndex < 0 || stepIndex >= steps.length) return false;

        const step = steps[stepIndex];
        for (const action of step.actions) {
          const el = slide.querySelector(`[data-el="${action.target}"]`);
          if (!el) continue;
          const delay = action.delay || 0;
          if (delay > 0) {
            const timer = setTimeout(() => this.applyStepAction(el, action), delay);
            this.stepTimers.push(timer);
          } else {
            this.applyStepAction(el, action);
          }
        }
        return true;
      }

      applyStepAction(el, action) {
        const duration = action.duration;
        const isSVG = el instanceof SVGElement;

        switch (action.type) {
          case 'enter': {
            el.classList.remove('step-hidden', 'step-exiting');
            el.classList.add('step-entering');
            el.style.visibility = 'visible';
            const dur = duration || 600;
            const anim = action.animation || 'fadeIn';

            // drawPath 特殊处理：自动计算路径长度
            if (anim === 'drawPath' && isSVG) {
              this.initDrawPath(el);
            }

            el.style.animation = `${anim} ${dur}ms ease forwards`;
            break;
          }
          case 'exit': {
            el.classList.add('step-exiting');
            el.classList.remove('step-entering');
            const dur = duration || 400;
            const anim = action.animation || 'fadeOut';

            // erasePath 特殊处理
            if (anim === 'erasePath' && isSVG) {
              this.initDrawPath(el);
            }

            el.style.animation = `${anim} ${dur}ms ease forwards`;
            el.addEventListener('animationend', () => {
              el.classList.add('step-hidden');
              el.classList.remove('step-exiting');
              el.style.visibility = 'hidden';
            }, { once: true });
            break;
          }
          case 'move': {
            const dur = duration || 600;
            el.style.transition = `transform ${dur}ms ease`;
            if (action.transform) {
              el.style.transform = action.transform;
            } else {
              el.style.transform = `translate(${action.x || 0}px, ${action.y || 0}px)`;
            }
            break;
          }
          case 'morph': {
            const dur = duration || 600;
            // CSS style 属性
            if (action.style) {
              el.style.transition = `all ${dur}ms ease`;
              Object.assign(el.style, action.style);
            }
            // SVG attribute 属性（fill, stroke, r, rx, ry, width, height, opacity 等）
            if (action.attrs && isSVG) {
              // 保存原始值用于 reset
              if (!el._originalAttrs) el._originalAttrs = {};
              for (const [attr, val] of Object.entries(action.attrs)) {
                if (!(attr in el._originalAttrs)) {
                  el._originalAttrs[attr] = el.getAttribute(attr);
                }
              }
              // SVG 属性的动画过渡：用 CSS transition 处理可动画的属性
              el.style.transition = `all ${dur}ms ease`;
              for (const [attr, val] of Object.entries(action.attrs)) {
                // 对于 CSS 也能控制的 SVG 呈现属性，优先走 style
                const cssifiable = ['fill', 'stroke', 'stroke-width', 'opacity', 'r', 'rx', 'ry', 'cx', 'cy', 'x', 'y', 'width', 'height', 'font-size'];
                if (cssifiable.includes(attr)) {
                  el.style.setProperty(attr, val);
                } else {
                  el.setAttribute(attr, val);
                }
              }
            }
            break;
          }
          case 'highlight': {
            el.classList.add('is-highlighted');
            el.classList.remove('is-dimmed');
            // SVG 元素用 drop-shadow filter 做高亮
            if (isSVG && !action.noGlow) {
              el.style.filter = `drop-shadow(0 0 8px var(--color-accent))`;
              el.style.transition = 'filter 380ms ease, opacity 380ms ease';
            }
            if (action.group) {
              const slide = el.closest('.slide');
              if (slide) {
                slide.querySelectorAll(`[data-focus-group="${action.group}"]`).forEach(peer => {
                  if (peer !== el) {
                    peer.classList.add('is-dimmed');
                    peer.classList.remove('is-highlighted');
                  }
                });
              }
            }
            break;
          }
          case 'dim': {
            el.classList.add('is-dimmed');
            el.classList.remove('is-highlighted');
            if (isSVG) {
              el.style.filter = '';
              el.style.transition = 'filter 380ms ease, opacity 380ms ease';
            }
            break;
          }
        }
      }

      // 自动初始化 SVG path 的 stroke-dash 属性（drawPath / erasePath 前置）
      initDrawPath(el) {
        // 对 <path> 元素自动计算总长度
        if (el.tagName === 'path' && typeof el.getTotalLength === 'function') {
          const len = Math.ceil(el.getTotalLength());
          el.style.setProperty('--path-length', len);
          el.setAttribute('stroke-dasharray', len);
          el.setAttribute('stroke-dashoffset', len);
        }
        // 对 <g> 等容器，处理其中所有 path 子元素
        else if (el.querySelectorAll) {
          el.querySelectorAll('path, line, polyline, polygon, circle, ellipse').forEach(path => {
            if (typeof path.getTotalLength === 'function') {
              const len = Math.ceil(path.getTotalLength());
              path.style.setProperty('--path-length', len);
              path.setAttribute('stroke-dasharray', len);
              path.setAttribute('stroke-dashoffset', len);
              path.style.animation = `drawPath ${parseInt(el.style.animation) || 600}ms ease forwards`;
            }
          });
        }
      }

      /* ── 原有 action 系统 ── */

      queryActionTargets(slide, target) {
        if (!target) return [];
        if (target.selector) return Array.from(slide.querySelectorAll(target.selector));
        if (target.focusId) {
          return Array.from(slide.querySelectorAll(`[data-step-target="${target.focusId}"]`));
        }
        return [];
      }

      resetFocusGroup(slide, groupName) {
        if (!groupName) return;
        slide.querySelectorAll(`[data-focus-group="${groupName}"]`).forEach(element => {
          element.classList.remove('is-highlighted', 'is-dimmed');
        });
      }

      applyAction(action, slide) {
        const targets = this.queryActionTargets(slide, action.target);
        const groupName = action.target?.group;

        if (action.actionType === 'focus-item' || action.actionType === 'highlight') {
          if (action.payload?.resetGroup !== false) {
            this.resetFocusGroup(slide, groupName);
          }
          const groupElements = groupName
            ? Array.from(slide.querySelectorAll(`[data-focus-group="${groupName}"]`))
            : [];
          groupElements.forEach(element => element.classList.add('is-dimmed'));
          targets.forEach(element => {
            element.classList.add('is-highlighted');
            element.classList.remove('is-dimmed');
          });
          return;
        }

        if (action.actionType === 'dim-others') {
          const groupElements = groupName
            ? Array.from(slide.querySelectorAll(`[data-focus-group="${groupName}"]`))
            : [];
          groupElements.forEach(element => element.classList.add('is-dimmed'));
          targets.forEach(element => element.classList.remove('is-dimmed'));
          return;
        }

        if (action.actionType === 'reveal') {
          targets.forEach(element => element.classList.add('visible'));
        }
      }

      scheduleActions(slide) {
        const config = this.getSceneConfig(slide);
        (config?.actions || []).forEach(action => {
          const timer = setTimeout(() => this.applyAction(action, slide), action.enterAt || 0);
          this.actionTimers.push(timer);
        });
      }

      /* ── 核心导航（Step 优先） ── */

      showSlide(index) {
        this.clearTimers();
        this.resetSlideState();

        if (index >= this.slides.length) {
          this.currentIndex = this.slides.length - 1;
          this.updateCounter();
          this.progressBar.style.width = '100%';
          return;
        }

        if (index < 0) index = 0;
        this.currentIndex = index;
        const slide = this.slides[index];
        slide.classList.add('active');

        // 重置该 slide 的 step 状态
        this.resetSlideStepState(slide);
        this.currentStep = -1;

        // data-enter-at 渐进揭示（兼容旧模式）
        slide.querySelectorAll('[data-enter-at]').forEach(element => {
          const enterAt = this.getElementEnterAt(element, slide);
          const timer = setTimeout(() => element.classList.add('visible'), enterAt);
          this.elementTimers.push(timer);
        });

        // 原有 action 调度
        this.scheduleActions(slide);

        const steps = this.getSlideSteps(slide);
        if (steps.length > 0) {
          // 有 step 配置：自动执行第一步
          this.currentStep = 0;
          this.executeStep(slide, 0);
          this.updateCounter();

          // 自动播放：按 step 序列推进
          if (window.timelineConfig.autoPlay) {
            this.scheduleAutoSteps(slide, 0);
          }
        } else {
          // 无 step 配置：旧模式，按 duration 自动切下一章节
          this.updateCounter();
          if (window.timelineConfig.autoPlay) {
            const duration = this.getSlideDuration(slide);
            const startTime = Date.now();
            this.animateProgress(startTime, duration);
            this.sceneTimer = setTimeout(() => {
              this.elapsedTotal += duration;
              this.showSlide(index + 1);
            }, duration);
          }
        }
      }

      scheduleAutoSteps(slide, fromStep) {
        const steps = this.getSlideSteps(slide);
        let cumulativeDelay = 0;

        for (let i = fromStep; i < steps.length; i++) {
          if (i > fromStep) {
            // 从第二步开始计算延迟
            cumulativeDelay += (steps[i - 1].duration || 800) + this.stepGap;
            const stepIdx = i;
            const delay = cumulativeDelay;
            const timer = setTimeout(() => {
              if (this.currentIndex !== Array.from(this.slides).indexOf(slide)) return;
              this.currentStep = stepIdx;
              this.executeStep(slide, stepIdx);
              this.updateCounter();
            }, delay);
            this.stepTimers.push(timer);
          }
        }

        // 所有 step 播完后，等最后一步的 duration + transitionDuration 后切下一章
        const lastStep = steps[steps.length - 1];
        const totalStepTime = cumulativeDelay + (lastStep?.duration || 800) + this.stepGap;
        const transitionDuration = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--transition-duration')) || 800;
        const timer = setTimeout(() => {
          if (this.currentIndex !== Array.from(this.slides).indexOf(slide)) return;
          this.elapsedTotal += this.getSlideDuration(slide);
          this.showSlide(this.currentIndex + 1);
        }, totalStepTime + transitionDuration);
        this.stepTimers.push(timer);

        // 进度条动画
        const startTime = Date.now();
        this.animateProgress(startTime, totalStepTime + transitionDuration);
      }

      next() {
        const slide = this.slides[this.currentIndex];
        const steps = this.getSlideSteps(slide);

        if (steps.length > 0 && this.currentStep < steps.length - 1) {
          // 还有下一步：推进 step
          this.clearTimers();
          this.currentStep++;
          this.executeStep(slide, this.currentStep);
          this.updateCounter();

          // 自动播放：从当前步继续
          if (window.timelineConfig.autoPlay) {
            this.scheduleAutoSteps(slide, this.currentStep);
          }
        } else {
          // step 用完或无 step：切下一章节
          if (slide) {
            this.elapsedTotal = Math.min(this.totalDuration, this.elapsedTotal + this.getSlideDuration(slide));
          }
          this.showSlide(this.currentIndex + 1);
        }
      }

      prev() {
        const slide = this.slides[this.currentIndex];
        const steps = this.getSlideSteps(slide);

        if (steps.length > 0 && this.currentStep > 0) {
          // 还在当前章节内，回退到上一步：重置 + 重放
          this.clearTimers();
          this.currentStep--;
          this.resetSlideStepState(slide);
          for (let i = 0; i <= this.currentStep; i++) {
            this.executeStep(slide, i);
          }
          this.updateCounter();
        } else {
          // 已在第一步或无 step：回退到上一个章节
          const prevIndex = Math.max(this.currentIndex - 1, 0);
          this.elapsedTotal = this.slides
            .slice(0, prevIndex)
            .reduce((sum, s) => sum + this.getSlideDuration(s), 0);

          // 显示上一章节
          this.clearTimers();
          this.resetSlideState();
          this.currentIndex = prevIndex;
          const prevSlide = this.slides[prevIndex];
          prevSlide.classList.add('active');

          // 重置 step 状态
          this.resetSlideStepState(prevSlide);

          // data-enter-at 全部可见
          prevSlide.querySelectorAll('[data-enter-at]').forEach(el => el.classList.add('visible'));

          const prevSteps = this.getSlideSteps(prevSlide);
          if (prevSteps.length > 0) {
            // 重放上一章的所有 step（显示最终状态）
            this.currentStep = prevSteps.length - 1;
            for (let i = 0; i <= this.currentStep; i++) {
              this.executeStep(prevSlide, i);
            }
          } else {
            this.currentStep = -1;
          }
          this.updateCounter();
        }
      }

      /* ── 播放控制 ── */

      start() {
        this.elapsedTotal = 0;
        this.progressBar.style.width = '0%';
        this.showSlide(0);
      }

      pause() {
        window.timelineConfig.autoPlay = false;
        this.clearTimers();
      }

      resume() {
        window.timelineConfig.autoPlay = true;
        const slide = this.slides[this.currentIndex];
        const steps = this.getSlideSteps(slide);

        if (steps.length > 0 && this.currentStep < steps.length - 1) {
          // 有剩余 step：从当前步继续自动推进
          this.scheduleAutoSteps(slide, this.currentStep + 1);
        } else if (steps.length === 0) {
          // 无 step 模式：重新显示当前 slide
          this.showSlide(this.currentIndex);
        } else {
          // step 已播完：切下一章
          const lastStep = steps[steps.length - 1];
          const transitionDuration = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--transition-duration')) || 800;
          this.sceneTimer = setTimeout(() => {
            this.elapsedTotal += this.getSlideDuration(slide);
            this.showSlide(this.currentIndex + 1);
          }, (lastStep?.duration || 800) + transitionDuration);
        }
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      window.timeline = new TimelineEngine();
      window.timeline.start();
    });

    document.addEventListener('keydown', event => {
      if (event.key === 'ArrowRight' || event.key === ' ') { event.preventDefault(); window.timeline.next(); }
      if (event.key === 'ArrowLeft') { event.preventDefault(); window.timeline.prev(); }
      if (event.key.toLowerCase() === 'p') window.timeline.pause();
      if (event.key.toLowerCase() === 'r') window.timeline.resume();
    });
  </script>
</body>
</html>
